{% extends 'learning_logs/base.html' %}

{% block content %}
  {% if form.errors %}
    <p>Sorry, your username and password didn't match.</p>
    <p>Please try again.</p>
  {% endif %}

  <form action="{% url 'accounts:login' %}" method="post">
    {% csrf_token %}
    {{ form.as_div }}
    <button name="submit">Login</button>
  </form>

{% endblock content %}
